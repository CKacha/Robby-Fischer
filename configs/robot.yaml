leader_port: "/dev/ttyACM0"
follower_port: "/dev/ttyACM1"
baudrate: 115200
timeout_s: 0.2

# Motion safety + conventions:
safe_z_mm: 80
grasp_z_mm: 10
tray_pose:
  x_mm: 220
  y_mm: 0
  z_mm: 80

# If you have known mapping from chess squares to XY mm,
# you can fill it later; for now we generate a simple grid.
board_origin:
  x_mm: 100
  y_mm: -70
  z_mm: 0
square_size_mm: 25
